# Publishes @graundtech/fluent2-react-kit to npm when a GitHub release is
# published. Auth is npm "trusted publishing" (OIDC) — no token secret; npm
# trusts this repo + this workflow filename, configured in the package's
# settings on npmjs.com (Settings → Trusted publisher: graundtech/
# fluent2-react-kit, workflow publish.yml). Provenance attestation is
# generated automatically by npm when publishing via OIDC.
#
# The very first publish of the package can't go through this workflow —
# trusted publishers are configured on an existing package — so 0.5.1 is
# published manually (see docs/status-and-backlog.md), and every release
# after that lands here.
name: Publish to npm

on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write # required for npm trusted publishing (OIDC)

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4 # reads pnpm version from packageManager

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      # Trusted publishing needs npm >= 11.5.1; don't rely on the bundled one.
      - run: npm install -g npm@latest

      - run: pnpm install --frozen-lockfile

      # Guard: the release tag (vX.Y.Z) must match the package version, so a
      # stale tag can never publish the wrong thing.
      - name: Check tag matches package version
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PKG="$(node -p "require('./packages/react/package.json').version")"
          if [ "$TAG" != "$PKG" ]; then
            echo "Release tag v$TAG does not match package version $PKG" >&2
            exit 1
          fi

      - run: pnpm build:package
      - run: pnpm test
      - run: pnpm --filter @graundtech/fluent2-react-kit typecheck

      - name: Publish
        working-directory: packages/react
        run: npm publish
