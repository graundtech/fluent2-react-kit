<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Fluent 2 React Kit</title>
  <desc id="desc">Fluent 2-inspired React components available through a shadcn registry and npm.</desc>
  <defs>
    <linearGradient id="canvas" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F9FAFF"/>
      <stop offset=".52" stop-color="#EEF5FF"/>
      <stop offset="1" stop-color="#FBEAFC"/>
    </linearGradient>
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="18" stdDeviation="24" flood-color="#443A76" flood-opacity=".16"/>
