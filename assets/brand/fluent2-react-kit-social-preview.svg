    <text x="0" y="174" fill="#171717" font-family="Helvetica Neue" font-size="88" font-weight="700">React Kit</text>
    <text x="4" y="245" fill="#56545D" font-family="Helvetica Neue" font-size="30">Fluent-inspired components.</text>
    <text x="4" y="286" fill="#56545D" font-family="Helvetica Neue" font-size="30">Source-owned through shadcn or npm.</text>
    <g transform="translate(4 340)">
