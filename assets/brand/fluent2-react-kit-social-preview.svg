  </defs>
  <rect width="1200" height="630" fill="url(#canvas)"/>
  <circle cx="1010" cy="100" r="230" fill="#EADFFF" opacity=".72"/>
  <circle cx="880" cy="600" r="280" fill="#DDEEFF" opacity=".72"/>

  <g transform="translate(82 94)">
